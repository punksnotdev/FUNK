name: e2e

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  smoke:
    name: stack smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Show docker + compose versions
        run: |
          docker version --format '{{.Server.Version}}'
          docker compose version

      - name: Run smoke test
        env:
          KEEP_STACK: "0"
        run: bash tests/e2e/smoke.sh

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo '=== control plane ==='
          docker compose \
            --env-file infra/env/control.dev.env \
            -f infra/compose/compose.control.yml \
            -f infra/compose/compose.control.dev.override.yml \
            logs --no-color --tail=200 || true
          echo '=== media plane ==='
          docker compose \
            --env-file infra/env/media.dev.env \
            -f infra/compose/compose.media.yml \
            -f infra/compose/compose.media.dev.override.yml \
            logs --no-color --tail=200 || true
