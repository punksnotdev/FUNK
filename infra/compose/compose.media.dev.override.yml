name: funk-media

# Dev-only: a shared external bridge so the radio service can reach the
# control plane's auth service by DNS name (alias: `auth`). Create once:
# `docker network create funk_dev`. Prod runs the planes on separate hosts
# and the radio service reaches auth via a public HTTPS URL instead.
networks:
  funk_dev:
    external: true

services:
  icecast:
    ports:
      - "${ICECAST_HOST_PORT:-8000}:8000"

  liquidsoap:
    ports:
      - "${LIQUIDSOAP_TELNET_HOST_PORT:-1234}:1234"
      - "${HARBOR_LIVE_HOST_PORT:-8001}:8001"
      - "${HARBOR_BREAKING_HOST_PORT:-8002}:8002"

  radio:
    ports:
      - "${RADIO_HOST_PORT:-4003}:${RADIO_PORT:-4003}"
    networks:
      media_private:
      funk_dev: {}

  nginx:
    ports:
      - "${HLS_ORIGIN_HOST_PORT:-8080}:8080"

  recordings:
    ports:
      - "${RECORDINGS_HOST_PORT:-4004}:${RECORDINGS_PORT:-4004}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
