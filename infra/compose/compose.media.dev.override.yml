name: funk-media

services:
  icecast:
    ports:
      - "${ICECAST_HOST_PORT:-8000}:8000"

  liquidsoap:
    ports:
      - "${LIQUIDSOAP_TELNET_HOST_PORT:-1234}:1234"
      - "${HARBOR_LIVE_HOST_PORT:-8001}:8001"
      - "${HARBOR_BREAKING_HOST_PORT:-8002}:8002"

  radio:
    ports:
      - "${RADIO_HOST_PORT:-4003}:${RADIO_PORT:-4003}"
    # In dev, both planes typically run on the same Docker host. The radio
    # service reaches auth on the control plane via the host gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    ports:
      - "${HLS_ORIGIN_HOST_PORT:-8080}:8080"
