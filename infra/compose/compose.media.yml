name: funk-media

services:
  icecast:
    image: infiniteproject/icecast:latest
    restart: unless-stopped
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:?ICECAST_SOURCE_PASSWORD is required}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:?ICECAST_ADMIN_PASSWORD is required}
      ICECAST_PASSWORD: ${ICECAST_RELAY_PASSWORD:?ICECAST_RELAY_PASSWORD is required}
    networks:
      - media_private
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # One-shot: make the recordings volume writable by liquidsoap (uid 10000).
  # Docker initializes named volumes as root:root 0755, so liquidsoap's
  # output.file would otherwise die with "Permission denied" and no live
  # session would ever be recorded. The recordings daemon runs as root and is
  # unaffected. Runs to completion before liquidsoap/recordings start.
  recordings-init:
    image: alpine:3.20
    command:
      - "sh"
      - "-c"
      - "mkdir -p /var/funk/recordings/live /var/funk/recordings/breaking && chown -R 10000:10000 /var/funk/recordings && chmod -R 0775 /var/funk/recordings"
    volumes:
      - funk_recordings:/var/funk/recordings
    restart: "no"

  # Audio engine. Streams the priority chain (breaking > interrupt > live > main
  # > white-noise fallback) into icecast `funk.mp3`. Controlled by funk-radio
  # via telnet on port 1234. See infra/services/liquidsoap/funk.liq.
  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
      recordings-init:
        condition: service_completed_successfully
    environment:
      ICECAST_HOST: icecast
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD}
      RADIO_INTERNAL_SECRET: ${RADIO_INTERNAL_SECRET:?RADIO_INTERNAL_SECRET is required}
    volumes:
      - ../services/liquidsoap/funk.liq:/etc/liquidsoap/funk.liq:ro
      - funk_schedule:/etc/funk
      - funk_recordings:/var/funk/recordings
    networks:
      - media_private
    expose:
      - "1234"   # telnet control
      - "8001"   # live harbor mount
      - "8002"   # breaking harbor mount
    command: ["liquidsoap", "/etc/liquidsoap/funk.liq"]
    healthcheck:
      # savonet/liquidsoap has python3 but no nc/curl; probe telnet over TCP.
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import socket,sys;s=socket.create_connection(('127.0.0.1',1234),2);s.sendall(b'help\\n');d=b''\nwhile True:\n  c=s.recv(1024)\n  if not c: break\n  d+=c\n  if b'END' in d: break\nsys.exit(0 if b'|' in d else 1)"
      interval: 20s
      timeout: 5s
      retries: 10

  hls:
    build:
      context: ../services/media-hls
    image: funk/media-hls:dev
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
      liquidsoap:
        condition: service_started
    environment:
      ICECAST_SOURCE_URL: ${ICECAST_SOURCE_URL:?ICECAST_SOURCE_URL is required}
      HLS_DIR: /hls
      SEGMENT_SECONDS: ${SEGMENT_SECONDS:-6}
      PLAYLIST_SIZE: ${PLAYLIST_SIZE:-6}
      FFMPEG_LOGLEVEL: ${FFMPEG_LOGLEVEL:-warning}
    volumes:
      - hlsdata:/hls
    networks:
      - media_private
    healthcheck:
      test: ["CMD-SHELL", "test -f /hls/master.m3u8 && grep -q '#EXTM3U' /hls/master.m3u8"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Thin HTTPS control API in front of liquidsoap. See apps/radio/ and ADR-002.
  # The consumer (uaolaf-like product) calls these endpoints with its FUNK
  # service credential to apply schedules, mint live credentials, push
  # interrupts, and discover recordings.
  radio:
    build:
      context: ../..
      dockerfile: apps/radio/Dockerfile
    image: funk/radio:dev
    restart: unless-stopped
    depends_on:
      liquidsoap:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${RADIO_PORT:-4003}
      TENANT_ID: ${TENANT_ID:-default}
      AUTH_URL: ${AUTH_URL:?AUTH_URL is required (control-plane auth; e.g. http://auth:4001 on the shared funk_dev network in dev, https://auth.funk.example in prod)}
      # ADR-004 Amendment (2026-06-23): the media plane is fully stateless.
      # Harbor credentials + sessions live in the control-plane auth service;
      # radio validates over HTTP via auth's internal endpoints, guarded by this
      # shared secret (must match auth's AUTH_INTERNAL_SECRET on the control side).
      AUTH_INTERNAL_SECRET: ${AUTH_INTERNAL_SECRET:?AUTH_INTERNAL_SECRET is required (shared secret radio sends to auth's internal harbor endpoints; must match auth)}
      # ADR-004 Slice 3: radio answers GET /v1/radio/recordings by listing the
      # control-plane storage `recordings/` prefix (no in-memory index). STORAGE_URL
      # is the internal address; STORAGE_PUBLIC_URL is the host baked into each
      # recording's storage_url (must be reachable by the consumer). ADMIN_BOOTSTRAP_TOKEN
      # mints radio's own service credential for the authed listing call.
      STORAGE_URL: ${STORAGE_URL:?STORAGE_URL is required}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-${STORAGE_URL}}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:?ADMIN_BOOTSTRAP_TOKEN is required}
      LIQUIDSOAP_HOST: liquidsoap
      LIQUIDSOAP_TELNET_PORT: 1234
      SCHEDULE_FILE: /etc/funk/schedule.m3u
      RECORDINGS_DIR: /var/funk/recordings
      RADIO_INTERNAL_SECRET: ${RADIO_INTERNAL_SECRET}
    volumes:
      - funk_schedule:/etc/funk
      - funk_recordings:/var/funk/recordings
    networks:
      - media_private
    expose:
      - "${RADIO_PORT:-4003}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${RADIO_PORT:-4003}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      hls:
        condition: service_healthy
    volumes:
      - hlsdata:/usr/share/nginx/html/hls:ro
      - ../services/media-nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - media_private
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/hls/master.m3u8 | grep -q '#EXTM3U'"]
      interval: 15s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2
    restart: unless-stopped
    profiles: ["with-edge"]
    depends_on:
      - nginx
    environment:
      CADDY_ADMIN_EMAIL: ${CADDY_ADMIN_EMAIL:-ops@example.org}
      ORIGIN_PUBLIC_HOSTNAME: ${ORIGIN_PUBLIC_HOSTNAME:-}
    volumes:
      - ../ops/caddy/media/Caddyfile:/etc/caddy/Caddyfile:ro
      - media_caddy_data:/data
      - media_caddy_config:/config
    networks:
      - media_private
    ports:
      - "80:80"
      - "443:443"

  # Recording upload daemon. Watches /var/funk/recordings for completed MP3s,
  # queries radio for session attribution, and uploads to FUNK storage.
  #
  # Reaches radio by service name on media_private. Reaches auth and storage
  # via RECORDINGS_AUTH_URL and STORAGE_URL (both DNS aliases on the shared
  # funk_dev bridge in dev; public HTTPS URLs in prod).
  recordings:
    build:
      context: ../..
      dockerfile: apps/recordings/Dockerfile
    image: funk/recordings:dev
    restart: unless-stopped
    depends_on:
      recordings-init:
        condition: service_completed_successfully
      liquidsoap:
        condition: service_started
      radio:
        condition: service_started
    environment:
      TZ: UTC
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${RECORDINGS_PORT:-4004}
      AUTH_URL: ${RECORDINGS_AUTH_URL:?RECORDINGS_AUTH_URL is required (auth URL for recordings daemon)}
      STORAGE_URL: ${STORAGE_URL:?STORAGE_URL is required}
      # Public-facing URL that ends up in recordings' storage_url field. In
      # dev this is the host-mapped storage port (consumers run on the host);
      # in prod set to the public HTTPS URL.
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-${STORAGE_URL}}
      RADIO_URL: http://radio:${RADIO_PORT:-4003}
      RADIO_INTERNAL_SECRET: ${RADIO_INTERNAL_SECRET:?RADIO_INTERNAL_SECRET is required}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:?ADMIN_BOOTSTRAP_TOKEN is required}
      RECORDINGS_DIR: /var/funk/recordings
      STABILITY_SECONDS: ${STABILITY_SECONDS:-30}
    volumes:
      - funk_recordings:/var/funk/recordings
    networks:
      - media_private
    expose:
      - "${RECORDINGS_PORT:-4004}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${RECORDINGS_PORT:-4004}/health"]
      interval: 15s
      timeout: 5s
      retries: 10

networks:
  media_private:
    driver: bridge

volumes:
  hlsdata:
  funk_schedule:
  funk_recordings:
  media_caddy_data:
  media_caddy_config:
