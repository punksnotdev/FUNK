name: funk-media

services:
  icecast:
    image: infiniteproject/icecast:latest
    restart: unless-stopped
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:?ICECAST_SOURCE_PASSWORD is required}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:?ICECAST_ADMIN_PASSWORD is required}
      ICECAST_PASSWORD: ${ICECAST_RELAY_PASSWORD:?ICECAST_RELAY_PASSWORD is required}
    networks:
      - media_private
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Audio engine. Streams the priority chain (breaking > interrupt > live > main
  # > white-noise fallback) into icecast `funk.mp3`. Controlled by funk-radio
  # via telnet on port 1234. See infra/services/liquidsoap/funk.liq.
  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
    environment:
      ICECAST_HOST: icecast
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD}
      HARBOR_LIVE_PASSWORD: ${HARBOR_LIVE_PASSWORD:?HARBOR_LIVE_PASSWORD is required}
      HARBOR_BREAKING_PASSWORD: ${HARBOR_BREAKING_PASSWORD:?HARBOR_BREAKING_PASSWORD is required}
    volumes:
      - ../services/liquidsoap/funk.liq:/etc/liquidsoap/funk.liq:ro
      - funk_schedule:/etc/funk
      - funk_recordings:/var/funk/recordings
    networks:
      - media_private
    expose:
      - "1234"   # telnet control
      - "8001"   # live harbor mount
      - "8002"   # breaking harbor mount
    command: ["liquidsoap", "/etc/liquidsoap/funk.liq"]
    healthcheck:
      test: ["CMD-SHELL", "(echo 'help'; sleep 0.5) | nc -w 2 127.0.0.1 1234 | grep -q '^|' || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  hls:
    build:
      context: ../services/media-hls
    image: funk/media-hls:dev
    restart: unless-stopped
    depends_on:
      icecast:
        condition: service_healthy
      liquidsoap:
        condition: service_started
    environment:
      ICECAST_SOURCE_URL: ${ICECAST_SOURCE_URL:?ICECAST_SOURCE_URL is required}
      HLS_DIR: /hls
      SEGMENT_SECONDS: ${SEGMENT_SECONDS:-6}
      PLAYLIST_SIZE: ${PLAYLIST_SIZE:-6}
      FFMPEG_LOGLEVEL: ${FFMPEG_LOGLEVEL:-warning}
    volumes:
      - hlsdata:/hls
    networks:
      - media_private
    healthcheck:
      test: ["CMD-SHELL", "test -f /hls/master.m3u8 && grep -q '#EXTM3U' /hls/master.m3u8"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      hls:
        condition: service_healthy
    volumes:
      - hlsdata:/usr/share/nginx/html/hls:ro
      - ../services/media-nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - media_private
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/hls/master.m3u8 | grep -q '#EXTM3U'"]
      interval: 15s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2
    restart: unless-stopped
    profiles: ["with-edge"]
    depends_on:
      - nginx
    environment:
      CADDY_ADMIN_EMAIL: ${CADDY_ADMIN_EMAIL:-ops@example.org}
      ORIGIN_PUBLIC_HOSTNAME: ${ORIGIN_PUBLIC_HOSTNAME:-}
    volumes:
      - ../ops/caddy/media/Caddyfile:/etc/caddy/Caddyfile:ro
      - media_caddy_data:/data
      - media_caddy_config:/config
    networks:
      - media_private
    ports:
      - "80:80"
      - "443:443"

networks:
  media_private:
    driver: bridge

volumes:
  hlsdata:
  funk_schedule:
  funk_recordings:
  media_caddy_data:
  media_caddy_config:
