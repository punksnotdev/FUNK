name: funk-control

# Dev-only: a shared external bridge so the media plane's radio service can
# reach auth by DNS name. Create once: `docker network create funk_dev`.
# Prod runs the planes on separate hosts and uses real HTTPS URLs instead.
networks:
  funk_dev:
    external: true

services:
  postgres:
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  minio:
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"

  auth:
    ports:
      - "${AUTH_HOST_PORT:-4001}:${AUTH_PORT:-4001}"
    networks:
      control_private:
      funk_dev:
        aliases: [auth]

  storage:
    ports:
      - "${STORAGE_HOST_PORT:-4002}:${STORAGE_PORT:-4002}"
    networks:
      control_private:
      funk_dev:
        aliases: [storage]
