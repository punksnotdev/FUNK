worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Anti-surveillance: no access logs by default. Override per-deployment if needed.
  access_log off;

  types {
    application/vnd.apple.mpegurl m3u8;
    video/mp2t ts;
  }

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    location = /healthz {
      default_type text/plain;
      return 200 "ok\n";
    }

    # NOTE: nginx `add_header` does NOT inherit from outer blocks when the inner
    # block defines its own. Each regex location below repeats the CORS headers
    # on purpose — moving them to /hls/ alone silently drops them on m3u8/ts.

    location ~* ^/hls/.*\.m3u8$ {
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Range, Origin" always;
      add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
      if ($request_method = OPTIONS) { return 204; }
      try_files $uri =404;
    }

    location ~* ^/hls/.*\.ts$ {
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Range, Origin" always;
      add_header Cache-Control "public, max-age=30, s-maxage=30, immutable" always;
      if ($request_method = OPTIONS) { return 204; }
      try_files $uri =404;
    }

    location /hls/ {
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Range, Origin" always;
      if ($request_method = OPTIONS) { return 204; }
      try_files $uri =404;
    }
  }
}
