# LibreTime configuration for FUNK media plane.
# Generated by `scripts/libretime-setup.sh` from this template; do not edit
# the generated config.yml directly — re-run setup if you need to change things.
#
# Key integration points:
#   - database/rabbitmq talk to LibreTime's own services (libretime-postgres, libretime-rabbitmq)
#   - liquidsoap publishes into FUNK's existing `icecast` service (same media_private network)
#   - icecast mount is `funk.mp3` so FUNK's HLS segmenter (which pulls from
#     http://icecast:8000/funk.mp3) picks up LibreTime's broadcast unchanged

general:
  public_url: ${LIBRETIME_PUBLIC_URL}
  api_key: ${LIBRETIME_API_KEY}
  secret_key: ${LIBRETIME_SECRET_KEY}
  allowed_cors_origins: []
  timezone: ${LIBRETIME_TIMEZONE}
  cache_ahead_hours: 1
  auth: local

storage:
  path: /srv/libretime

database:
  host: libretime-postgres
  port: 5432
  name: libretime
  user: libretime
  password: ${LIBRETIME_POSTGRES_PASSWORD}

rabbitmq:
  host: libretime-rabbitmq
  port: 5672
  vhost: /libretime
  user: libretime
  password: ${LIBRETIME_RABBITMQ_PASSWORD}

playout:
  liquidsoap_host: libretime-liquidsoap
  liquidsoap_port: 1234
  record_file_format: ogg
  record_bitrate: 256
  record_samplerate: 44100
  record_channels: 2
  record_sample_size: 16

liquidsoap:
  server_listen_address: "0.0.0.0"
  server_listen_port: 1234
  harbor_listen_address: ["0.0.0.0"]

stream:
  inputs:
    main:
      mount: main
      port: 8001
      secure: false
    show:
      mount: show
      port: 8002
      secure: false

  outputs:
    .default_icecast_output: &default_icecast_output
      host: icecast
      port: 8000
      source_password: ${ICECAST_SOURCE_PASSWORD}
      admin_password: ${ICECAST_ADMIN_PASSWORD}
      name: FUNK Radio
      description: scheduled programming via FUNK
      website: ${LIBRETIME_PUBLIC_URL}
      genre: various

    icecast:
      - <<: *default_icecast_output
        enabled: true
        mount: funk.mp3
        audio:
          format: mp3
          bitrate: 128

    shoutcast: []
    system: []
